# BYOM Handler Configuration
# This configuration allows you to connect to ANY LLM provider via HTTP

# Handler Configuration (for Concert registration)
handler:
  name: "byom_handler"
  description: "BYOM Handler for Concert GenAI"
  protocol: "https"  # Use "https" for SSL/TLS, "http" for non-SSL
  hostname: "localhost"
  port: 8082
  prefix: "custom_handler"
  
  # SSL/TLS Configuration
  ssl_enabled: true  # Set to false to disable HTTPS
  ssl_certfile: "certs/cert.pem"  # Path to SSL certificate
  ssl_keyfile: "certs/key.pem"    # Path to SSL private key

# Authentication for Concert requests
# auth:
#   type: "api_key"
#   header_name: "Authentication"
#   api_key: "${CONCERT_API_KEY}"

# Logging Configuration
logging:
  level: "INFO"

# LLM Endpoint Configuration
# Configure your LLM provider's HTTP endpoint details
llm_endpoint:
  # The base URL of your LLM service
  url: "https://us-south.ml.cloud.ibm.com/ml/v1/text/generation"
  
  # HTTP method (POST, GET, etc.)
  method: "POST"
  
  # Authentication headers
  headers:
    Authorization: "Bearer ${LLM_API_KEY}"
    Content-Type: "application/json"
  
  # Request body template - use {prompt} placeholder for the user's prompt
  # Use {param_name} for any parameter you want to pass
  request_body:
    input: "{prompt}"
    model_id: "meta-llama/llama-3-3-70b-instruct"
    project_id: "${WATSONX_PROJECT_ID}"
    parameters:
      max_new_tokens: 600
      temperature: 0.7
  
  # Response parsing - JSONPath to extract the generated text
  # Examples: 
  #   - "results[0].generated_text" for Watsonx
  #   - "choices[0].message.content" for OpenAI
  #   - "generated_text" for simple responses
  response_path: "results[0].generated_text"
  
  # Optional: Model name path in response (for Concert response)
  model_path: "model_id"
  
  # Timeout in seconds
  timeout: 60

